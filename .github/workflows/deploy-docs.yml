name: Deploy to GitHub Pages (docs directory)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:  # Allow manual triggers

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate posts index
        run: |
          # Create posts.md from all markdown files in /posts
          echo "# AI Agent Posts Index" > posts.md
          echo "" >> posts.md
          echo "*Generated automatically from markdown files in /posts directory*" >> posts.md
          echo "" >> posts.md
          echo "Last updated: $(date -u +'%B %d, %Y')" >> posts.md
          echo "" >> posts.md
          echo "## All Posts" >> posts.md
          echo "" >> posts.md
          
          # Count markdown files
          count=$(find posts -name "*.md" | wc -l)
          echo "Total posts: $count AI agent articles" >> posts.md
          echo "" >> posts.md
          
          # List all posts
          for file in posts/*.md; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .md)
              title=$(echo "$filename" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
              echo "### $title" >> posts.md
              echo "- **File:** \`$filename.md\`" >> posts.md
              echo "- **Link:** [Read article](/posts/$filename.html)" >> posts.md
              echo "" >> posts.md
            fi
          done
          
          echo "---" >> posts.md
          echo "" >> posts.md
          echo "This index is automatically generated by GitHub Actions on every push." >> posts.md
      
      - name: Build static site to /docs
        run: npm run build:docs
      
      - name: Verify /docs directory
        run: |
          echo "Contents of /docs directory:"
          ls -la docs/
          echo ""
          echo "Checking index.html:"
          head -20 docs/index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4